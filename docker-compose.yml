networks:
  internal:
    driver: bridge

volumes:
  HNG-nginx-logs:
  nextcloud_data:

services:

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    networks:
      - internal
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - HNG-nginx-logs:/var/log/nginx
    depends_on:
      - nextcloud
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  nextcloud:
    image: kefaslungu/hng-nextcloud
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - nextcloud_data:/var/www/html
      - HNG-nginx-logs:/var/log/nginx:ro
    environment:
      NEXTCLOUD_TRUSTED_DOMAINS: ${SERVER_IP}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/status.php"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  detector:
    build:
      context: ./detector
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - HNG-nginx-logs:/var/log/nginx:ro
      - ./detector/config.yaml:/app/config.yaml:ro
    ports:
      - "8080:8080"
    cap_add:
      - NET_ADMIN
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - nginx